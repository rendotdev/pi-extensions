name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: .node-version
          cache: true
          run-install: |
            - args: ["--frozen-lockfile"]

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Check formatting, lint, and types
        run: vp check

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp run package

      - name: Check plugin metadata
        if: ${{ hashFiles('scripts/sync-plugin-metadata.ts') != '' }}
        run: bun scripts/sync-plugin-metadata.ts --check

      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          mkdir -p artifacts
          npm pack --silent --ignore-scripts --pack-destination artifacts
          tarball=$(find artifacts -maxdepth 1 -type f -name '*.tgz' -print -quit)
          test -n "$tarball"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify npm artifact contents
        run: bun scripts/verify-package.ts "${{ steps.pack.outputs.tarball }}"

      - name: Smoke-install npm artifact
        shell: bash
        run: |
          install_dir=$(mktemp -d)
          npm install --prefix "$install_dir" --ignore-scripts --no-audit --no-fund \
            "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"
          "$install_dir/node_modules/.bin/lgtm" --help
          "$install_dir/node_modules/.bin/lgtm" mcp </dev/null

      - name: Upload validated npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package-${{ github.sha }}
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
