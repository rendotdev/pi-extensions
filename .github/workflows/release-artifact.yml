name: Release artifact

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: .node-version
          cache: true
          run-install: |
            - args: ["--frozen-lockfile"]

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          test "${GITHUB_REF_NAME}" = "v${package_version}"

      - name: Check formatting, lint, and types
        run: vp check

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp run package

      - name: Check plugin metadata
        if: ${{ hashFiles('scripts/sync-plugin-metadata.ts') != '' }}
        run: bun scripts/sync-plugin-metadata.ts --check

      - name: Pack exact npm artifact
        id: pack
        shell: bash
        run: |
          mkdir -p artifacts
          npm pack --silent --ignore-scripts --pack-destination artifacts
          tarball=$(find artifacts -maxdepth 1 -type f -name '*.tgz' -print -quit)
          test -n "$tarball"
          sha256sum "$tarball" > "$tarball.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify npm artifact contents
        run: bun scripts/verify-package.ts "${{ steps.pack.outputs.tarball }}"

      - name: Smoke-install npm artifact
        shell: bash
        run: |
          install_dir=$(mktemp -d)
          npm install --prefix "$install_dir" --ignore-scripts --no-audit --no-fund \
            "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"
          "$install_dir/node_modules/.bin/lgtm" --help
          "$install_dir/node_modules/.bin/lgtm" mcp </dev/null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package-${{ github.ref_name }}
          path: |
            artifacts/*.tgz
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  release:
    name: Attach release artifact
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download validated artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package-${{ github.ref_name }}
          path: artifacts

      - name: Verify downloaded checksum
        run: sha256sum --check artifacts/*.sha256

      - name: Attach artifact to GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            artifacts/*.tgz
            artifacts/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
